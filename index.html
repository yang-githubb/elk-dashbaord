<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMT Board Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-title">
      <h1>SMT Board Dashboard</h1>
      <span id="status" class="status status-bad">Disconnected</span>
    </div>

    <div class="filters">
      <label class="filter">
        <span>Time</span>
        <select id="time"></select>
      </label>

      <label class="filter">
        <span>Line</span>
        <select id="line">
          <option value="">All lines</option>
        </select>
      </label>

      <label class="filter">
        <span>Model</span>
        <select id="model">
          <option value="">All models</option>
        </select>
      </label>
      
      <label class="filter">
        <span>Station</span>
        <select id="station">
          <option value="SPI">SPI</option>
          <option value="AOI">AOI</option>
        </select>
      </label>

      <button type="button" id="refresh" class="btn">Refresh</button>
    </div>

    <div class="meta">
      <span id="updated">—</span>
      <span id="mode-label">—</span>
    </div>
  </header>

  <div id="mock-banner" class="banner banner-mock hidden"></div>

  <div id="error" class="banner banner-error hidden" role="alert">
    <span id="error-text"></span>
    <button type="button" id="retry" class="btn btn-inline">Retry</button>
  </div>

  <main class="main">
    <section class="kpi-section">
      <h2 class="section-title">Board KPIs</h2>

      <div class="kpi-row">
        <div class="kpi-card kpi-card-highlight">
          <span class="kpi-label">Boards</span>
          <span id="kpi-board-count" class="kpi-value">—</span>
        </div>
        <div class="kpi-card">
          <span class="kpi-label">Pass</span>
          <span id="kpi-board-pass" class="kpi-value kpi-ok">—</span>
        </div>
        <div class="kpi-card">
          <span class="kpi-label">Fail</span>
          <span id="kpi-board-fail" class="kpi-value kpi-error">—</span>
        </div>
        <div class="kpi-card">
          <span class="kpi-label">Yield</span>
          <span id="kpi-board-yield" class="kpi-value">—</span>
        </div>
      </div>

      <div class="panel chart-panel">
        <div class="panel-head">
          <h3>Board PASS / FAIL</h3>
        </div>
        <div id="chart-board" class="chart-area"></div>
      </div>
    </section>

    <section class="kpi-section">
      <h2 class="section-title">Pad KPIs</h2>

      <div class="kpi-row">
        <div class="kpi-card kpi-card-highlight">
          <span class="kpi-label">Pads</span>
          <span id="kpi-pad-count" class="kpi-value">—</span>
        </div>
        <div class="kpi-card">
          <span class="kpi-label">Pass</span>
          <span id="kpi-pad-pass" class="kpi-value kpi-ok">—</span>
        </div>
        <div class="kpi-card">
          <span class="kpi-label">Fail</span>
          <span id="kpi-pad-fail" class="kpi-value kpi-error">—</span>
        </div>
        <div class="kpi-card">
          <span class="kpi-label">Yield</span>
          <span id="kpi-pad-yield" class="kpi-value">—</span>
        </div>
      </div>

      <div class="panel chart-panel">
        <div class="panel-head">
          <h3>Pad Result Distribution</h3>
        </div>
        <div id="chart-pad" class="chart-area"></div>
      </div>
    </section>

    <section id="board-panel" class="panel panel-table">
      <div class="panel-head">
        <h2>Board Serial Numbers</h2>
        <span class="panel-hint">Click a serial to view pad inspection data</span>
        <span id="loading-tag" class="loading-tag hidden">Updating…</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead id="board-thead"></thead>
          <tbody id="board-tbody"></tbody>
        </table>
      </div>

      <div class="pager">
        <button type="button" id="board-prev" class="btn">Previous</button>
        <span id="board-page-info">Page 1 of 1</span>
        <button type="button" id="board-next" class="btn">Next</button>
      </div>
    </section>

    <section id="pad-panel" class="panel panel-table hidden">
      <div class="panel-head panel-head-split">
        <div class="panel-head-left">
          <button type="button" id="back-boards" class="btn btn-back">← Boards</button>
          <h2>Pads for <span id="pad-serial-label" class="serial-label"></span></h2>
        </div>
        <span id="pad-loading-tag" class="loading-tag hidden">Loading…</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead id="pad-thead"></thead>
          <tbody id="pad-tbody"></tbody>
        </table>
      </div>

      <div class="pager">
        <button type="button" id="pad-prev" class="btn">Previous</button>
        <span id="pad-page-info">Page 1 of 1</span>
        <button type="button" id="pad-next" class="btn">Next</button>
      </div>
    </section>
  </main>

  <!-- Config (order matters) -->
  <script src="config/profiles.js"></script>
  <script src="config/environments.js"></script>
  <script src="config/schema.spi.js"></script>
  <script src="config/schema.aoi.js"></script>
  <script src="config/settings.js"></script>
  <script src="config.js"></script>
  <script src="config/bootstrap.js"></script>

  <!-- Data + app -->
  <script src="mock-es.js"></script>
  <script src="js/config-access.js"></script>
  <script src="js/es-queries.js"></script>
  <script src="js/es-client.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
